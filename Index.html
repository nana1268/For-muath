<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Blooming Rose Motion</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Orbitron', monospace;
        }

        /* حاوية التصميم المستوحاة من الجوال وأبعاد الصورة الأصيلة */
        .card {
            position: relative;
            width: 380px;
            height: 680px;
            border: 1px solid #222;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        .header {
            text-align: left;
            width: 100%;
            padding-left: 10px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .header p {
            margin: 5px 0 0 0;
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 1px;
        }

        /* شاشة عرض الرموز المتحركة */
        #ascii-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 7.5px;
            line-height: 7.5px;
            white-space: pre;
            text-align: center;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.4);
            user-select: none;
        }

        .footer {
            text-align: right;
            width: 100%;
            max-width: 280px;
            color: #888;
            font-size: 0.65rem;
            line-height: 1.4;
            letter-spacing: 0.5px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>ASCII MOTION</h1>
        <p>CODE MEETS MOVEMENT</p>
    </div>

    <!-- مكان عرض الوردة التفاعلية التي تتفتح -->
    <pre id="ascii-display"></pre>

    <div class="footer">
        ASCII motion transforms images into dynamic grids of text characters, blending retro aesthetics with modern digital art.
    </div>
</div>

<script>
const display = document.getElementById('ascii-display');

const W = 52;
const H = 46;
const asciiChars = " .:-=+*#%@"; 

let angleX = 0.3; // زاوية ميلان افتراضية لرؤية الوردة من الأعلى قليلاً وهي تفتح
let angleY = 0;

// متغيرات التحكم بالتفتّح والنمو
let bloomScale = 0.0;    // حجم الوردة الحالي (يبدأ من صفر يعني مغلقة)
let targetBloom = 1.0;   // الحجم النهائي بعد اكتمال التفتح
let bloomSpeed = 0.008;  // سرعة تفتح الوردة (نعومة الحركة)

function renderAsciiRose() {
    let buffer = Array(W * H).fill(' ');
    let zBuffer = Array(W * H).fill(0);

    // جعل الوردة تتفتح تدريجياً بنعومة (سموث) حتى تصل للحجم الكامل
    if (bloomScale < targetBloom) {
        bloomScale += bloomSpeed;
    }

    // توليد الوردة برياضيات 3D مدمج بها تأثير التفتح (bloomScale)
    for (let theta = 0; theta < Math.PI * 5; theta += 0.06) {
        for (let phi = 0; phi < Math.PI * 2; phi += 0.06) {
            
            // تحجيم وتشكيل البتلات بناءً على مقياس التفتح الحالي bloomScale
            // البتلات تتسع وتنتشر للخارج مع زيادة الوقت
            let r = 11 * (Math.sin(theta * 1.5) * bloomScale + 1.1) * (1 - 0.25 * Math.cos(phi * 5) * bloomScale);
            
            // رسم الساق والورق السفلي
            let x0 = r * Math.sin(theta) * Math.cos(phi);
            let y0 = r * Math.sin(theta) * Math.sin(phi) - (theta > Math.PI * 2.5 ? (theta - Math.PI * 2.5) * 4 : 0);
            let z0 = r * Math.cos(theta);

            // تدوير الوردة 3D لحركة دوران انسيابية
            let x1 = x0 * Math.cos(angleY) - z0 * Math.sin(angleY);
            let z1 = x0 * Math.sin(angleY) + z0 * Math.cos(angleY);

            let y2 = y0 * Math.cos(angleX) - z1 * Math.sin(angleX);
            let z2 = y0 * Math.sin(angleX) + z1 * Math.cos(angleX);

            // إسقاط الأبعاد ثلاثية الأبعاد على الشاشة الثنائية
            let ooZ = 1 / (z2 + 45);
            let xp = Math.floor(W / 2 + x1 * 1.6 * ooZ * W * 0.42);
            let yp = Math.floor(H / 2 - y2 * ooZ * H * 0.42);

            if (xp >= 0 && xp < W && yp >= 0 && yp < H) {
                let idx = xp + yp * W;
                
                // الإضاءة والظلال على الرموز
                let luminance = Math.floor(((x1 + y2 + z2) / 28 + 1.2) * 4);
                luminance = Math.max(0, Math.min(asciiChars.length - 1, luminance));

                if (ooZ > zBuffer[idx]) {
                    zBuffer[idx] = ooZ;
                    buffer[idx] = asciiChars[luminance];
                }
            }
        }
    }

    // طباعة الشكل النهائي داخل الـ <pre>
    let output = "";
    for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
            output += buffer[x + y * W];
        }
        output += "\n";
    }
    display.textContent = output;

    // حركة دوران ناعمة مستمرة بعد أو أثناء التفتح
    angleY += 0.012;

    requestAnimationFrame(renderAsciiRose);
}

// تشغيل التأثير
renderAsciiRose();
</script>

</body>
</html>
