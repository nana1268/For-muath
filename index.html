<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تصميم مُشِعّ التفاعلي</title>
    <!-- استدعاء مكتبة p5.js للحركة والشبكة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@800&family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', 'Cairo', sans-serif;
        }

        /* حاوية التصميم بأبعاد عمودية متناسقة ومطابقة للصورة */
        .card-container {
            position: relative;
            width: 380px;
            height: 680px;
            border: 1px solid #222;
            background-color: #000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 12px;
        }

        /* المربع العلوي المحتوي على الاسم والجمل التشجيعية */
        .header-box {
            display: flex;
            height: 180px;
            border-bottom: 1px solid #222;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
        }

        /* مربع الاسم المشع العربي (اليمين) */
        .header-right-box {
            width: 45%;
            border-left: 1px solid #222;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        /* تأثير الكلمة العربية المتوهجة باللون الأبيض والنيون الأزرق */
        .glowing-title {
            color: #fff;
            font-size: 2.2rem;
            font-weight: 800;
            font-family: 'Cairo', sans-serif;
            text-align: center;
            text-shadow: 0 0 10px #fff,
                         0 0 20px #fff,
                         0 0 30px #00d2ff,
                         0 0 40px #00d2ff;
            animation: superGlow 1.5s infinite alternate ease-in-out;
        }

        /* مربع الجمل التشجيعية (اليسار) */
        .header-left-box {
            width: 55%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 15px;
        }

        /* عبارة I can fix you الفرعية */
        .fix-you-title {
            color: #00d2ff;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.5);
        }

        /* تنسيق العبارة التشجيعية الطويلة */
        .motivational-text {
            color: #b3b3b3;
            font-size: 0.65rem;
            line-height: 1.4;
            text-align: left;
            font-weight: 400;
        }

        /* منطقة الرسم الخاصة بالشبكة */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* أنيميشن نبض الإشعاع للاسم */
        @keyframes superGlow {
            0% {
                text-shadow: 0 0 10px #fff, 0 0 20px rgba(0,210,255,0.6);
                transform: scale(0.98);
            }
            100% {
                text-shadow: 0 0 15px #fff, 0 0 30px #00d2ff, 0 0 50px rgba(0,210,255,0.8);
                transform: scale(1.02);
            }
        }
    </style>
</head>
<body>

<div class="card-container">
    <!-- منطقة تفاعل الحركة (الشبكة والخطوط) -->
    <div id="canvas-container"></div>

    <!-- الهيكل العلوي المحدث بالاسم العربي والنصوص المطلوبة -->
    <div class="header-box">
        <!-- المربع الأيمن: الاسم المشع بالعربي -->
        <div class="header-right-box">
            <div class="glowing-title">مُشِعّ</div>
        </div>
        
        <!-- المربع الأيسر: العبارات التشجيعية بالإنجليزية -->
        <div class="header-left-box">
            <div class="fix-you-title">I can fix you</div>
            <div class="motivational-text">
                You’ve always been capable of doing great things, with or without anyone by your side. Never forget your worth. At the end of the day, you deserve the best—not just what’s available.
            </div>
        </div>
    </div>
</div>

<script>
let spacing = 32; 
let targetX = 0;  
let targetY = 0;
let easeX = 0;    
let easeY = 0;
let easingSpeed = 0.07; // التنعيم الفائق والانسيابي للحركة خلف الماوس

function setup() {
    let canvas = createCanvas(380, 680);
    canvas.parent('canvas-container');
    
    easeX = width / 2;
    easeY = height / 2 + 90;
}

function draw() {
    background(0); 

    // تتبع حركة الماوس أو اللمس بسلاسة
    if (mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height) {
        targetX = mouseX;
        targetY = mouseY;
    } else {
        // العودة التلقائية للمنتصف عند خروج المؤشر
        targetX = width / 2;
        targetY = height / 2 + 110;
    }
    
    easeX += (targetX - easeX) * easingSpeed;
    easeY += (targetY - easeY) * easingSpeed;

    // رسم شبكة النقاط والخطوط التفاعلية
    for (let x = spacing / 2; x < width; x += spacing) {
        for (let y = 180 + spacing / 2; y < height - 20; y += spacing) {
            
            let d = dist(easeX, easeY, x, y);

            if (d < 160) {
                // تلاشي الخطوط تدريجياً وبنعومة تامة عند الأطراف
                let alpha = map(d, 0, 160, 240, 0);
                stroke(0, 210, 255, alpha * 0.35); // الروابط متناسقة مع لون الإشعاع النيوني الأزرق
                strokeWeight(1);
                line(easeX, easeY, x, y);

                // النقاط القريبة تتسع وتضيء بناءً على القرب
                let dotSize = map(d, 0, 160, 6, 2);
                fill(255, map(d, 0, 160, 255, 100));
                noStroke();
                ellipse(x, y, dotSize, dotSize);
            } else {
                // النقاط البعيدة تظل ساكنة وخافتة
                fill(45);
                noStroke();
                ellipse(x, y, 2, 2);
            }
        }
    }

    // رسم المركز المشع الرئيسي المتنقل
    noStroke();
    fill(0, 210, 255, 40);
    ellipse(easeX, easeY, 25, 25); // الهالة الخارجية الناعمة الأزرق السماوي
    fill(255);
    ellipse(easeX, easeY, 9, 9);  // النواة المركزية البيضاء
}
</script>

</body>
</html>
